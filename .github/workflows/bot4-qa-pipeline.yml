name: Bot4 QA Pipeline

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  bot4_qa_prep:
    if: >-
      contains(github.event.issue.labels.*.name, 'write-blog') &&
      (
        contains(github.event.comment.body, '<!-- bot4-qa-check -->') ||
        contains(github.event.comment.body, 'go for QA') ||
        contains(github.event.comment.body, 'Go for QA') ||
        contains(github.event.comment.body, 'QA check') ||
        contains(github.event.comment.body, 'qa check')
      ) &&
      github.event.sender.login != 'github-actions[bot]' &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Capture start time
        id: timing
        run: echo "start_epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Bot 4 QA prep
        run: |
          node scripts/bots/run-bot4-qa-prep.js \
            --event "$GITHUB_EVENT_PATH" \
            --output "$RUNNER_TEMP/bot4-output.json" \
            --comment "$RUNNER_TEMP/bot4-comment.md"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Validate Bot 4 output schema
        run: npm run validate:bot4

      - name: Ensure runtime Bot 4 output is schema-valid
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const Ajv = require('ajv/dist/2020');

          const root = process.cwd();
          const schema = JSON.parse(fs.readFileSync(path.join(root, '.github/bots/schemas/bot4-qa-output.schema.json'), 'utf8'));
          const out = JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/bot4-output.json', 'utf8'));
          const ajv = new Ajv({ allErrors: true, strict: false });
          const validate = ajv.compile(schema);

          if (!validate(out)) {
            const errors = (validate.errors || [])
              .map((e) => `${e.instancePath || '/'}: ${e.message}`)
              .join('; ');
            throw new Error('Runtime Bot 4 output failed schema validation: ' + errors);
          }
          NODE

      - name: Post Bot 4 status comment
        if: always()
        uses: actions/github-script@v7
        env:
          START_EPOCH: ${{ steps.timing.outputs.start_epoch }}
        with:
          script: |
            const fs = require('fs');
            const runId = context.runId;
            const stage = 'bot4_qa_prep';
            const startEpoch = Number(process.env.START_EPOCH || '0');
            const durationSec = startEpoch > 0 ? Math.max(0, Math.floor(Date.now() / 1000 - startEpoch)) : 0;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            let body = fs.readFileSync(`${process.env.RUNNER_TEMP}/bot4-comment.md`, 'utf8');
            const observability = [
              `- Stage: ${stage}`,
              `- Run ID: ${runId}`,
              `- Duration: ${durationSec}s`,
              `- Run URL: ${runUrl}`
            ].join('\n');

            body = body.replace(/(\*\*Bot 4 Result:[^\n]*\*\*)/, `$1\n\n${observability}`);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Stop when Bot 4 prerequisite is missing or blockers exist
        id: gate
        run: |
          node <<'NODE'
          const fs = require('fs');

          const j = JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/bot4-output.json', 'utf8'));
          if (j?.handoff?.prerequisiteMissing) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'skip_reason=missing_prerequisite\n');
            process.exit(0);
          }

          const blockers = j?.handoff?.blockers || [];
          if (blockers.length > 0) {
            console.error('Bot4 blockers:', blockers.join(', '));
            process.exit(1);
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'skip_reason=none\n');
          NODE

      - name: Extract branch and file metadata
        id: bot4_meta
        if: steps.gate.outcome == 'success' && steps.gate.outputs.skip_reason == 'none'
        run: |
          node <<'NODE'
          const fs = require('fs');

          const j = JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/bot4-output.json', 'utf8'));
          const out = process.env.GITHUB_OUTPUT;
          const prTitle = String(j?.artifact?.prTitle || '').replace(/\n/g, ' ').replace(/\r/g, ' ');

          fs.appendFileSync(out, 'branch_name=' + String(j?.artifact?.branchName || '') + '\n');
          fs.appendFileSync(out, 'post_file_path=' + String(j?.artifact?.postFilePath || '') + '\n');
          fs.appendFileSync(out, 'pr_title=' + prTitle + '\n');
          NODE

      - name: Prepare branch with Bot 4 markdown artifact
        if: steps.gate.outcome == 'success' && steps.gate.outputs.skip_reason == 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="${{ steps.bot4_meta.outputs.branch_name }}"
          FILE_PATH="${{ steps.bot4_meta.outputs.post_file_path }}"

          git fetch origin "$BRANCH" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -B "$BRANCH"
          fi

          git add "$FILE_PATH"
          if git diff --cached --quiet; then
            echo "No changes to commit for Bot4 artifact."
          else
            git commit -m "bot4: prepare qa artifact for issue #${{ github.event.issue.number }}"
            git push origin "$BRANCH"
          fi

      - name: Ensure branch exists remotely (no-content-change path)
        if: steps.gate.outcome == 'success' && steps.gate.outputs.skip_reason == 'none'
        run: |
          BRANCH="${{ steps.bot4_meta.outputs.branch_name }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Remote branch already exists: $BRANCH"
          else
            git push -u origin "$BRANCH"
          fi

      - name: Create or update PR
        if: steps.gate.outcome == 'success' && steps.gate.outputs.skip_reason == 'none'
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ steps.bot4_meta.outputs.branch_name }}
          PR_TITLE: ${{ steps.bot4_meta.outputs.pr_title }}
        with:
          script: |
            const branch = process.env.BRANCH_NAME;
            const title = process.env.PR_TITLE || `Bot4 QA: issue #${context.issue.number}`;
            const head = `${context.repo.owner}:${branch}`;

            const prs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head,
              base: 'main',
              per_page: 100
            });

            const body = [
              'Automated Bot 4 QA preparation PR.',
              '',
              `- Source issue: #${context.issue.number}`,
              '- Trigger: marker <!-- bot4-qa-check --> or comment phrase (go for QA / QA check)',
              '- Reviewer assignment: manual only',
              '- Merge policy: manual only'
            ].join('\n');

            if (prs.length > 0) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prs[0].number,
                title,
                body
              });
              core.info(`Updated PR #${prs[0].number}`);
            } else {
              const created = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                head: branch,
                base: 'main',
                body,
                draft: false
              });
              core.info(`Created PR #${created.data.number}`);
            }

      - name: Post Bot 4 workflow failure comment
        if: failure()
        uses: actions/github-script@v7
        env:
          START_EPOCH: ${{ steps.timing.outputs.start_epoch }}
        with:
          script: |
            const runId = context.runId;
            const stage = 'bot4_qa_prep';
            const startEpoch = Number(process.env.START_EPOCH || '0');
            const durationSec = startEpoch > 0 ? Math.max(0, Math.floor(Date.now() / 1000 - startEpoch)) : 0;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            const body = [
              '**Bot 4 Result: BLOCKED (workflow error)**',
              '',
              `- Stage: ${stage}`,
              `- Run ID: ${runId}`,
              `- Duration: ${durationSec}s`,
              `- Run URL: ${runUrl}`,
              '',
              '- Bot 4 workflow failed before PR preparation completed.',
              '- Check workflow logs for exact error details.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
