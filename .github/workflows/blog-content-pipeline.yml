name: Blog Content Pipeline

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  bot2_from_bot1_comment:
    if: >-
      contains(github.event.issue.labels.*.name, 'write-blog') &&
      contains(github.event.comment.body, '<!-- bot-1-output -->') &&
      github.event.sender.login != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Capture start time
        id: timing
        run: echo "start_epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Bot 2 output from Bot 1 marker
        run: |
          node scripts/bots/run-bot2-writer.js \
            --event "$GITHUB_EVENT_PATH" \
            --output "$RUNNER_TEMP/bot2-output.json" \
            --comment "$RUNNER_TEMP/bot2-comment.md"
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}

      - name: Upload Bot 2 output artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bot2-output
          path: ${{ runner.temp }}/bot2-output.json
          if-no-files-found: error

      - name: Post Bot 2 comment
        if: success()
        uses: actions/github-script@v7
        env:
          START_EPOCH: ${{ steps.timing.outputs.start_epoch }}
        with:
          script: |
            const fs = require('fs');
            const runId = context.runId;
            const stage = 'bot2_from_bot1_comment';
            const startEpoch = Number(process.env.START_EPOCH || '0');
            const durationSec = startEpoch > 0 ? Math.max(0, Math.floor(Date.now() / 1000 - startEpoch)) : 0;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            let body = fs.readFileSync(`${process.env.RUNNER_TEMP}/bot2-comment.md`, 'utf8');
            const observability = [
              `- Stage: ${stage}`,
              `- Run ID: ${runId}`,
              `- Duration: ${durationSec}s`,
              `- Run URL: ${runUrl}`
            ].join('\n');

            body = body.replace(/(\*\*Bot 2 Result:[^\n]*\*\*)/, `$1\n\n${observability}`);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Post workflow failure comment
        if: failure()
        uses: actions/github-script@v7
        env:
          START_EPOCH: ${{ steps.timing.outputs.start_epoch }}
        with:
          script: |
            const runId = context.runId;
            const stage = 'bot2_from_bot1_comment';
            const startEpoch = Number(process.env.START_EPOCH || '0');
            const durationSec = startEpoch > 0 ? Math.max(0, Math.floor(Date.now() / 1000 - startEpoch)) : 0;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            const body = [
              '**Bot 2 Result: BLOCKED (workflow error)**',
              '',
              `- Stage: ${stage}`,
              `- Run ID: ${runId}`,
              `- Duration: ${durationSec}s`,
              `- Run URL: ${runUrl}`,
              '',
              '- Could not parse or validate the Bot 1 payload from this comment.',
              '- Ensure marker <!-- bot-1-output --> exists and contains valid JSON.',
              '- Accepted formats: raw JSON text, fenced JSON block, or plain fenced block.',
              '- Check workflow logs for exact error details.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  bot3_refine_and_validate:
    needs: bot2_from_bot1_comment
    if: needs.bot2_from_bot1_comment.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Capture start time
        id: timing
        run: echo "start_epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Bot 2 output artifact
        uses: actions/download-artifact@v4
        with:
          name: bot2-output
          path: ${{ runner.temp }}

      - name: Generate Bot 3 output from Bot 2 payload
        run: |
          node scripts/bots/run-bot3-seo-refiner.js \
            --input "$RUNNER_TEMP/bot2-output.json" \
            --output "$RUNNER_TEMP/bot3-output.json" \
            --comment "$RUNNER_TEMP/bot3-comment.md"

      - name: Validate Bot 3 output
        run: |
          node scripts/bots/validate-bot3-output.js \
            --input "$RUNNER_TEMP/bot3-output.json" \
            --output "$RUNNER_TEMP/bot3-validated-output.json" \
            --comment "$RUNNER_TEMP/bot3-validated-comment.md"

      - name: Post Bot 3 validator comment
        if: success()
        uses: actions/github-script@v7
        env:
          START_EPOCH: ${{ steps.timing.outputs.start_epoch }}
        with:
          script: |
            const fs = require('fs');
            const runId = context.runId;
            const stage = 'bot3_refine_and_validate';
            const startEpoch = Number(process.env.START_EPOCH || '0');
            const durationSec = startEpoch > 0 ? Math.max(0, Math.floor(Date.now() / 1000 - startEpoch)) : 0;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            let body = fs.readFileSync(`${process.env.RUNNER_TEMP}/bot3-validated-comment.md`, 'utf8');
            const observability = [
              `- Stage: ${stage}`,
              `- Run ID: ${runId}`,
              `- Duration: ${durationSec}s`,
              `- Run URL: ${runUrl}`
            ].join('\n');

            body = body.replace(/(\*\*Bot 3 Result:[^\n]*\*\*)/, `$1\n\n${observability}`);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail when validator finds blockers
        if: success()
        run: |
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/bot3-validated-output.json','utf8'));const blockers=(j?.handoff?.blockers||[]);if(blockers.length>0){console.error('Bot3 validator blockers:',blockers.join(', '));process.exit(1);}"

      - name: Post workflow failure comment
        if: failure()
        uses: actions/github-script@v7
        env:
          START_EPOCH: ${{ steps.timing.outputs.start_epoch }}
        with:
          script: |
            const runId = context.runId;
            const stage = 'bot3_refine_and_validate';
            const startEpoch = Number(process.env.START_EPOCH || '0');
            const durationSec = startEpoch > 0 ? Math.max(0, Math.floor(Date.now() / 1000 - startEpoch)) : 0;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            const body = [
              '**Bot 3 Result: BLOCKED (workflow/validator error)**',
              '',
              `- Stage: ${stage}`,
              `- Run ID: ${runId}`,
              `- Duration: ${durationSec}s`,
              `- Run URL: ${runUrl}`,
              '',
              '- Could not refine and validate Bot 3 output in this run.',
              '- Check workflow logs for exact error details.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  validate_bot3_override:
    if: >-
      contains(github.event.issue.labels.*.name, 'write-blog') &&
      contains(github.event.comment.body, '<!-- bot3-manual-overrides -->') &&
      github.event.sender.login != 'github-actions[bot]' &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Capture start time
        id: timing
        run: echo "start_epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract latest Bot 3 output and override payload
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const OUTPUT_MARKER = '<!-- bot3-seo-output -->';
            const OVERRIDE_MARKER = '<!-- bot3-manual-overrides -->';

            function extractFirstJsonObject(text) {
              const input = String(text || '').trim();
              if (!input) return null;
              const start = input.indexOf('{');
              if (start === -1) return null;

              let depth = 0;
              let inString = false;
              let escaped = false;

              for (let i = start; i < input.length; i += 1) {
                const ch = input[i];

                if (inString) {
                  if (escaped) {
                    escaped = false;
                  } else if (ch === '\\') {
                    escaped = true;
                  } else if (ch === '"') {
                    inString = false;
                  }
                  continue;
                }

                if (ch === '"') {
                  inString = true;
                  continue;
                }

                if (ch === '{') depth += 1;
                if (ch === '}') depth -= 1;

                if (depth === 0) {
                  return input.slice(start, i + 1);
                }
              }

              return null;
            }

            function extractJsonAfterMarker(body, marker) {
              const markerIndex = String(body || '').indexOf(marker);
              if (markerIndex === -1) return null;

              const after = String(body).slice(markerIndex + marker.length);
              const candidates = [];

              const jsonFence = after.match(/```json\s*([\s\S]*?)```/i);
              if (jsonFence && jsonFence[1]) candidates.push(jsonFence[1].trim());

              const plainFence = after.match(/```\s*([\s\S]*?)```/i);
              if (plainFence && plainFence[1]) candidates.push(plainFence[1].trim());

              const rawJson = extractFirstJsonObject(after);
              if (rawJson) candidates.push(rawJson.trim());

              for (const candidate of candidates) {
                try {
                  return JSON.parse(candidate);
                } catch {
                  // continue
                }
              }

              return null;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const latestBot3 = [...comments]
              .reverse()
              .find((c) => String(c.body || '').includes(OUTPUT_MARKER));

            if (!latestBot3) {
              throw new Error('Could not find prior bot3-seo-output comment on this issue.');
            }

            const bot3Json = extractJsonAfterMarker(latestBot3.body, OUTPUT_MARKER);
            if (!bot3Json) {
              throw new Error('Could not parse JSON from latest bot3-seo-output comment.');
            }

            const overrideJson = extractJsonAfterMarker(context.payload.comment?.body || '', OVERRIDE_MARKER);
            if (!overrideJson) {
              throw new Error('Could not parse JSON from bot3-manual-overrides comment.');
            }

            fs.writeFileSync(`${process.env.RUNNER_TEMP}/bot3-output.json`, JSON.stringify(bot3Json, null, 2));
            fs.writeFileSync(`${process.env.RUNNER_TEMP}/bot3-override.json`, JSON.stringify(overrideJson, null, 2));

      - name: Validate Bot 3 override output
        run: |
          node scripts/bots/validate-bot3-output.js \
            --input "$RUNNER_TEMP/bot3-output.json" \
            --override "$RUNNER_TEMP/bot3-override.json" \
            --override-actor "${{ github.event.sender.login }}" \
            --output "$RUNNER_TEMP/bot3-validated-output.json" \
            --comment "$RUNNER_TEMP/bot3-validated-comment.md"

      - name: Post Bot 3 override validator comment
        if: success()
        uses: actions/github-script@v7
        env:
          START_EPOCH: ${{ steps.timing.outputs.start_epoch }}
        with:
          script: |
            const fs = require('fs');
            const runId = context.runId;
            const stage = 'validate_bot3_override';
            const startEpoch = Number(process.env.START_EPOCH || '0');
            const durationSec = startEpoch > 0 ? Math.max(0, Math.floor(Date.now() / 1000 - startEpoch)) : 0;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            let body = fs.readFileSync(`${process.env.RUNNER_TEMP}/bot3-validated-comment.md`, 'utf8');
            const observability = [
              `- Stage: ${stage}`,
              `- Run ID: ${runId}`,
              `- Duration: ${durationSec}s`,
              `- Run URL: ${runUrl}`
            ].join('\n');

            body = body.replace(/(\*\*Bot 3 Result:[^\n]*\*\*)/, `$1\n\n${observability}`);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  bot4_qa_prep:
    if: >-
      contains(github.event.issue.labels.*.name, 'write-blog') &&
      contains(github.event.comment.body, '<!-- bot4-qa-check -->') &&
      github.event.sender.login != 'github-actions[bot]' &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Capture start time
        id: timing
        run: echo "start_epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Bot 4 QA prep
        run: |
          node scripts/bots/run-bot4-qa-prep.js \
            --event "$GITHUB_EVENT_PATH" \
            --output "$RUNNER_TEMP/bot4-output.json" \
            --comment "$RUNNER_TEMP/bot4-comment.md"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Validate Bot 4 output schema
        run: npm run validate:bot4

      - name: Ensure runtime Bot 4 output is schema-valid
        run: |
          node -e "const fs=require('fs');const path=require('path');const Ajv=require('ajv/dist/2020');const root=process.cwd();const schema=JSON.parse(fs.readFileSync(path.join(root,'.github/bots/schemas/bot4-qa-output.schema.json'),'utf8'));const out=JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/bot4-output.json','utf8'));const ajv=new Ajv({allErrors:true,strict:false});const validate=ajv.compile(schema);if(!validate(out)){const errors=(validate.errors||[]).map(e=>`${e.instancePath||'/'}: ${e.message}`).join('; ');throw new Error('Runtime Bot 4 output failed schema validation: ' + errors);}"

      - name: Post Bot 4 status comment
        if: always()
        uses: actions/github-script@v7
        env:
          START_EPOCH: ${{ steps.timing.outputs.start_epoch }}
        with:
          script: |
            const fs = require('fs');
            const runId = context.runId;
            const stage = 'bot4_qa_prep';
            const startEpoch = Number(process.env.START_EPOCH || '0');
            const durationSec = startEpoch > 0 ? Math.max(0, Math.floor(Date.now() / 1000 - startEpoch)) : 0;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            let body = fs.readFileSync(`${process.env.RUNNER_TEMP}/bot4-comment.md`, 'utf8');
            const observability = [
              `- Stage: ${stage}`,
              `- Run ID: ${runId}`,
              `- Duration: ${durationSec}s`,
              `- Run URL: ${runUrl}`
            ].join('\n');

            body = body.replace(/(\*\*Bot 4 Result:[^\n]*\*\*)/, `$1\n\n${observability}`);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Stop when Bot 4 prerequisite is missing or blockers exist
        id: gate
        run: |
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/bot4-output.json','utf8'));if(j?.handoff?.prerequisiteMissing){fs.appendFileSync(process.env.GITHUB_OUTPUT,'skip_reason=missing_prerequisite\n');process.exit(0);}const blockers=(j?.handoff?.blockers||[]);if(blockers.length>0){console.error('Bot4 blockers:',blockers.join(', '));process.exit(1);}fs.appendFileSync(process.env.GITHUB_OUTPUT,'skip_reason=none\n');"

      - name: Extract branch and file metadata
        id: bot4_meta
        if: steps.gate.outcome == 'success' && steps.gate.outputs.skip_reason == 'none'
        run: |
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/bot4-output.json','utf8'));const out=process.env.GITHUB_OUTPUT;fs.appendFileSync(out,`branch_name=${j.artifact.branchName}\n`);fs.appendFileSync(out,`post_file_path=${j.artifact.postFilePath}\n`);fs.appendFileSync(out,`pr_title=${(j.artifact.prTitle||'').replace(/\n/g,' ').replace(/\r/g,' ')}\n`);"

      - name: Prepare branch with Bot 4 markdown artifact
        if: steps.gate.outcome == 'success' && steps.gate.outputs.skip_reason == 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="${{ steps.bot4_meta.outputs.branch_name }}"
          FILE_PATH="${{ steps.bot4_meta.outputs.post_file_path }}"

          git fetch origin "$BRANCH" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -B "$BRANCH"
          fi

          git add "$FILE_PATH"
          if git diff --cached --quiet; then
            echo "No changes to commit for Bot4 artifact."
          else
            git commit -m "bot4: prepare qa artifact for issue #${{ github.event.issue.number }}"
            git push origin "$BRANCH"
          fi

      - name: Ensure branch exists remotely (no-content-change path)
        if: steps.gate.outcome == 'success' && steps.gate.outputs.skip_reason == 'none'
        run: |
          BRANCH="${{ steps.bot4_meta.outputs.branch_name }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Remote branch already exists: $BRANCH"
          else
            git push -u origin "$BRANCH"
          fi

      - name: Create or update PR
        if: steps.gate.outcome == 'success' && steps.gate.outputs.skip_reason == 'none'
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ steps.bot4_meta.outputs.branch_name }}
          PR_TITLE: ${{ steps.bot4_meta.outputs.pr_title }}
        with:
          script: |
            const branch = process.env.BRANCH_NAME;
            const title = process.env.PR_TITLE || `Bot4 QA: issue #${context.issue.number}`;
            const head = `${context.repo.owner}:${branch}`;

            const prs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head,
              base: 'main',
              per_page: 100
            });

            const body = [
              'Automated Bot 4 QA preparation PR.',
              '',
              `- Source issue: #${context.issue.number}`,
              `- Trigger marker: <!-- bot4-qa-check -->`,
              '- Reviewer assignment: manual only',
              '- Merge policy: manual only'
            ].join('\n');

            if (prs.length > 0) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prs[0].number,
                title,
                body
              });
              core.info(`Updated PR #${prs[0].number}`);
            } else {
              const created = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                head: branch,
                base: 'main',
                body,
                draft: false
              });
              core.info(`Created PR #${created.data.number}`);
            }

      - name: Post Bot 4 workflow failure comment
        if: failure()
        uses: actions/github-script@v7
        env:
          START_EPOCH: ${{ steps.timing.outputs.start_epoch }}
        with:
          script: |
            const runId = context.runId;
            const stage = 'bot4_qa_prep';
            const startEpoch = Number(process.env.START_EPOCH || '0');
            const durationSec = startEpoch > 0 ? Math.max(0, Math.floor(Date.now() / 1000 - startEpoch)) : 0;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            const body = [
              '**Bot 4 Result: BLOCKED (workflow error)**',
              '',
              `- Stage: ${stage}`,
              `- Run ID: ${runId}`,
              `- Duration: ${durationSec}s`,
              `- Run URL: ${runUrl}`,
              '',
              '- Bot 4 workflow failed before PR preparation completed.',
              '- Check workflow logs for exact error details.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail when validator finds blockers
        if: success()
        run: |
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/bot3-validated-output.json','utf8'));const blockers=(j?.handoff?.blockers||[]);if(blockers.length>0){console.error('Bot3 override validator blockers:',blockers.join(', '));process.exit(1);}"

      - name: Post override validator workflow failure comment
        if: failure()
        uses: actions/github-script@v7
        env:
          START_EPOCH: ${{ steps.timing.outputs.start_epoch }}
        with:
          script: |
            const runId = context.runId;
            const stage = 'validate_bot3_override';
            const startEpoch = Number(process.env.START_EPOCH || '0');
            const durationSec = startEpoch > 0 ? Math.max(0, Math.floor(Date.now() / 1000 - startEpoch)) : 0;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            const body = [
              '**Bot 3 Result: BLOCKED (override validator error)**',
              '',
              `- Stage: ${stage}`,
              `- Run ID: ${runId}`,
              `- Duration: ${durationSec}s`,
              `- Run URL: ${runUrl}`,
              '',
              '- Override validator failed before final READY for QA handoff.',
              '- Check workflow logs for exact blocker details.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
